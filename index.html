<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M.Marius</title>
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #ffffff;
      font-family: 'Cormorant Garamond', serif;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    .scene {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 2rem;
      position: relative;
    }

    h1 {
      font-size: clamp(2.2rem, 7vw, 4rem);
      font-weight: 300;
      font-style: italic;
      letter-spacing: 0.02em;
      color: #1a1612;
      animation: fadeUp 1s ease both;
    }

    .divider {
      width: 3.5rem;
      height: 1px;
      background: #888;
      opacity: 0.5;
      animation: expandLine 1.2s 0.2s ease both;
    }

    .player {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.6rem;
      animation: fadeUp 1s 0.2s ease both;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 1.4rem;
    }

    .waveform {
      display: flex;
      align-items: center;
      gap: 3px;
      height: 28px;
    }
    .bar {
      width: 3px;
      border-radius: 2px;
      background: #555;
      opacity: 0.4;
      height: 5px;
    }
    .waveform.active .bar {
      animation: wave 1.1s ease-in-out infinite;
      opacity: 0.65;
    }
    .bar:nth-child(1)  { animation-delay: 0.00s; }
    .bar:nth-child(2)  { animation-delay: 0.10s; }
    .bar:nth-child(3)  { animation-delay: 0.20s; }
    .bar:nth-child(4)  { animation-delay: 0.30s; }
    .bar:nth-child(5)  { animation-delay: 0.15s; }
    .bar:nth-child(6)  { animation-delay: 0.05s; }
    .bar:nth-child(7)  { animation-delay: 0.25s; }
    .bar:nth-child(8)  { animation-delay: 0.35s; }
    .bar:nth-child(9)  { animation-delay: 0.10s; }
    .bar:nth-child(10) { animation-delay: 0.20s; }
    .bar:nth-child(11) { animation-delay: 0.00s; }
    .bar:nth-child(12) { animation-delay: 0.30s; }

    @keyframes wave {
      0%, 100% { height: 5px; }
      50%       { height: 22px; }
    }

    .btn-play {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: none;
      background: none;
      padding: 0;
      cursor: pointer;
      flex-shrink: 0;
      transition: transform 0.2s, opacity 0.2s;
      position: relative;
    }
    .btn-play img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      display: block;
    }
    .btn-play .icon-pause {
      display: none;
      position: absolute;
      inset: 0;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.2);
      border-radius: 50%;
    }
    .btn-play.playing .icon-pause { display: flex; }
    .btn-play:hover { transform: scale(1.05); }
    .btn-play:active { transform: scale(0.97); }
    .btn-play .icon-pause svg { fill: white; }

    .volume-wrap {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .volume-wrap svg { fill: #888; flex-shrink: 0; }
    input[type=range] {
      -webkit-appearance: none;
      width: 80px;
      height: 1px;
      background: rgba(0,0,0,0.2);
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: #333;
    }

    .track-info {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }
    .track-title {
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      color: #555;
      font-style: normal;
      font-weight: 400;
    }
    .progress-bar {
      width: 100%;
      height: 1px;
      background: rgba(0,0,0,0.15);
      cursor: pointer;
    }
    .progress-fill {
      height: 100%;
      background: #333;
      width: 0%;
      transition: width 0.4s linear;
    }
    .progress-times {
      display: flex;
      justify-content: space-between;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      color: #999;
    }

    /* Image oeuvre — format vertical, bas droite */
    .artwork {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      width: clamp(70px, 12vw, 110px);
      height: clamp(105px, 18vw, 165px);
      border: 1px solid rgba(0,0,0,0.1);
      overflow: hidden;
      animation: fadeUp 1s 0.4s ease both;
    }
    .artwork-placeholder {
      width: 100%;
      height: 100%;
      background: #f4f4f4;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
    }
    .artwork-placeholder span {
      font-family: monospace;
      font-size: 0.52rem;
      color: #bbb;
      text-align: center;
      letter-spacing: 0.05em;
      line-height: 1.6;
    }
    .artwork img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes expandLine {
      from { width: 0; opacity: 0; }
      to   { width: 3.5rem; opacity: 0.5; }
    }
  </style>
</head>

<audio id="audio" preload="auto">
  <source src="musique.mp3" type="audio/mpeg">
</audio>

<script>
  document.addEventListener('contextmenu', e => e.preventDefault());
  document.addEventListener('keydown', e => {
    const blocked = (e.ctrlKey || e.metaKey) &&
      ['c','u','s','a','p','i'].includes(e.key.toLowerCase());
    if (blocked) e.preventDefault();
    if (e.key === 'F12') e.preventDefault();
  });
  try { history.replaceState(null, '', '/'); } catch(_) {}

  const audio       = document.getElementById('audio');
  const btn         = document.getElementById('btnPlay');
  const waveform    = document.getElementById('waveform');
  const fill        = document.getElementById('progressFill');
  const elapsed     = document.getElementById('timeElapsed');
  const dur         = document.getElementById('timeDuration');
  const volSlider   = document.getElementById('volume');
  const progressBar = document.getElementById('progressBar');

  function fmt(s) {
    if (!isFinite(s)) return '–:––';
    return `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
  }

  function setPlaying(p) {
    btn.classList.toggle('playing', p);
    waveform.classList.toggle('active', p);
  }

  btn.addEventListener('click', () => {
    if (audio.paused) { audio.play(); setPlaying(true); }
    else              { audio.pause(); setPlaying(false); }
  });

  audio.addEventListener('timeupdate', () => {
    const pct = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
    fill.style.width = pct + '%';
    elapsed.textContent = fmt(audio.currentTime);
  });

  audio.addEventListener('loadedmetadata', () => {
    dur.textContent = fmt(audio.duration);
  });

  audio.addEventListener('ended', () => setPlaying(false));
  volSlider.addEventListener('input', () => { audio.volume = volSlider.value; });

  progressBar.addEventListener('click', e => {
    if (!audio.duration) return;
    const rect = progressBar.getBoundingClientRect();
    audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
  });
</script>
